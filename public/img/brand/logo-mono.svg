<svg xmlns="http://www.w3.org/2000/svg" viewBox="79 64 242 272" width="242" height="272" fill="currentColor" role="img" aria-label="KubeAtlas">
  <title>KubeAtlas (monochrome)</title>
  <desc>Single-color KubeAtlas hex network mark; inherits color from CSS via currentColor.</desc>

  <g stroke="currentColor" stroke-width="2" stroke-dasharray="6 4" fill="none" stroke-linecap="butt">
    <line x1="200" y1="200" x2="200" y2="90"/>
    <line x1="200" y1="200" x2="295" y2="145"/>
    <line x1="200" y1="200" x2="295" y2="255"/>
    <line x1="200" y1="200" x2="200" y2="310"/>
    <line x1="200" y1="200" x2="105" y2="255"/>
    <line x1="200" y1="200" x2="105" y2="145"/>
    <line x1="200" y1="90"  x2="295" y2="145"/>
    <line x1="295" y1="145" x2="295" y2="255"/>
    <line x1="295" y1="255" x2="200" y2="310"/>
    <line x1="200" y1="310" x2="105" y2="255"/>
    <line x1="105" y1="255" x2="105" y2="145"/>
    <line x1="105" y1="145" x2="200" y2="90"/>
  </g>

  <g>
    <circle cx="200" cy="90"  r="18"/>
    <circle cx="295" cy="145" r="18"/>
    <circle cx="295" cy="255" r="18"/>
    <circle cx="200" cy="310" r="18"/>
    <circle cx="105" cy="255" r="18"/>
    <circle cx="105" cy="145" r="18"/>
    <circle cx="200" cy="200" r="19"/>
  </g>
</svg>
