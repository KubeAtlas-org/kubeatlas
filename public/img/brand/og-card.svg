<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="KubeAtlas — See your whole Kubernetes cluster at a glance.">
  <title>KubeAtlas social card</title>
  <desc>Hexagon-mesh dark surface with the KubeAtlas hex-network mark, lowercase kubeatlas wordmark, and the tagline "See your whole Kubernetes cluster at a glance."</desc>

  <defs>
    <polygon id="ka-hex" points="0,-34.641 30,-17.321 30,17.321 0,34.641 -30,17.321 -30,-17.321"/>
    <pattern id="ka-mesh" patternUnits="userSpaceOnUse" width="60" height="103.923" patternTransform="translate(34 -7)">
      <g fill="none" stroke="#1b2230" stroke-width="1" stroke-linejoin="round" opacity="0.55">
        <use href="#ka-hex" x="0"  y="0"/>
        <use href="#ka-hex" x="60" y="0"/>
        <use href="#ka-hex" x="0"  y="103.923"/>
        <use href="#ka-hex" x="60" y="103.923"/>
        <use href="#ka-hex" x="30" y="51.962"/>
        <use href="#ka-hex" x="-30" y="51.962"/>
        <use href="#ka-hex" x="90" y="51.962"/>
        <use href="#ka-hex" x="30" y="-51.962"/>
        <use href="#ka-hex" x="30" y="155.885"/>
      </g>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0d1117"/>
  <rect width="1200" height="630" fill="url(#ka-mesh)"/>

  <!-- Mark + wordmark are centered as one composition.
       Mark visible content: 188px wide × 211px tall (after scale 0.775 of 400-space).
       Wordmark "kubeatlas" at 95pt Inter 800 (-2 letter-spacing): ~410px wide.
       Composition total = 188 + 50 (gap) + 410 = 648 wide. Centered: left = (1200-648)/2 = 276.
       Mark translate.x = 276 - 79*0.775 ≈ 215 (where x=79 is the leftmost visible point in 400-space).
       Mark translate.y: visual center at y=290 (slightly above mid to leave room for tagline) → translate.y = 290 - 200*0.775 = 135.
       Wordmark left edge x = 276 + 188 + 50 = 514. Baseline y so optical center sits at y=290: 290 + cap-height/2 ≈ 290 + 34 = 324. -->
  <g transform="translate(215 135) scale(0.775)">
    <g stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4" fill="none">
      <line x1="200" y1="200" x2="200" y2="90"/>
      <line x1="200" y1="200" x2="295" y2="145"/>
      <line x1="200" y1="200" x2="295" y2="255"/>
      <line x1="200" y1="200" x2="200" y2="310"/>
      <line x1="200" y1="200" x2="105" y2="255"/>
      <line x1="200" y1="200" x2="105" y2="145"/>
      <line x1="200" y1="90"  x2="295" y2="145"/>
      <line x1="295" y1="145" x2="295" y2="255"/>
      <line x1="295" y1="255" x2="200" y2="310"/>
      <line x1="200" y1="310" x2="105" y2="255"/>
      <line x1="105" y1="255" x2="105" y2="145"/>
      <line x1="105" y1="145" x2="200" y2="90"/>
    </g>
    <g opacity="0.22">
      <circle cx="200" cy="90"  r="22" fill="#8b5cf6"/>
      <circle cx="295" cy="145" r="22" fill="#a855f7"/>
      <circle cx="295" cy="255" r="22" fill="#7c3aed"/>
      <circle cx="200" cy="310" r="22" fill="#10b981"/>
      <circle cx="105" cy="255" r="22" fill="#06b6d4"/>
      <circle cx="105" cy="145" r="22" fill="#22d3ee"/>
      <circle cx="200" cy="200" r="24" fill="#34d399"/>
    </g>
    <circle cx="200" cy="90"  r="18" fill="#8b5cf6"/>
    <circle cx="295" cy="145" r="18" fill="#a855f7"/>
    <circle cx="295" cy="255" r="18" fill="#7c3aed"/>
    <circle cx="200" cy="310" r="18" fill="#10b981"/>
    <circle cx="105" cy="255" r="18" fill="#06b6d4"/>
    <circle cx="105" cy="145" r="18" fill="#22d3ee"/>
    <circle cx="200" cy="200" r="19" fill="#34d399"/>
  </g>

  <text x="514" y="324" font-family="Inter, 'Helvetica Neue', Arial, system-ui, sans-serif" font-size="95" font-weight="800" letter-spacing="-2">
    <tspan fill="#ffffff">kube</tspan><tspan fill="#60a5fa">atlas</tspan>
  </text>

  <text x="600" y="480" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, system-ui, sans-serif" font-size="34" font-weight="600" letter-spacing="-0.3" fill="#8a95a8">See your whole Kubernetes cluster at a glance.</text>
</svg>
