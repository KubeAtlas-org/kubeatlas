<svg xmlns="http://www.w3.org/2000/svg" viewBox="79 64 242 272" width="242" height="272" role="img" aria-label="KubeAtlas (dark surface)">
  <title>KubeAtlas (dark surface)</title>
  <desc>Hex network mark: a central teal-green node connecting to six outer nodes via dashed blue edges, with an outer hex ring.</desc>

  <!-- dashed blue edges: spokes (center to each outer) -->
  <g stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4" fill="none" stroke-linecap="butt">
    <line x1="200" y1="200" x2="200" y2="90"/>
    <line x1="200" y1="200" x2="295" y2="145"/>
    <line x1="200" y1="200" x2="295" y2="255"/>
    <line x1="200" y1="200" x2="200" y2="310"/>
    <line x1="200" y1="200" x2="105" y2="255"/>
    <line x1="200" y1="200" x2="105" y2="145"/>
    <!-- outer ring -->
    <line x1="200" y1="90"  x2="295" y2="145"/>
    <line x1="295" y1="145" x2="295" y2="255"/>
    <line x1="295" y1="255" x2="200" y2="310"/>
    <line x1="200" y1="310" x2="105" y2="255"/>
    <line x1="105" y1="255" x2="105" y2="145"/>
    <line x1="105" y1="145" x2="200" y2="90"/>
  </g>

  <!-- nodes: soft tinted glow + bright fill (reads as a glow on a dark surface) -->
  <g opacity="0.22">
    <circle cx="200" cy="90"  r="22" fill="#8b5cf6"/>
    <circle cx="295" cy="145" r="22" fill="#a855f7"/>
    <circle cx="295" cy="255" r="22" fill="#7c3aed"/>
    <circle cx="200" cy="310" r="22" fill="#10b981"/>
    <circle cx="105" cy="255" r="22" fill="#06b6d4"/>
    <circle cx="105" cy="145" r="22" fill="#22d3ee"/>
    <circle cx="200" cy="200" r="24" fill="#34d399"/>
  </g>
  <g>
    <circle cx="200" cy="90"  r="18" fill="#8b5cf6"/>
    <circle cx="295" cy="145" r="18" fill="#a855f7"/>
    <circle cx="295" cy="255" r="18" fill="#7c3aed"/>
    <circle cx="200" cy="310" r="18" fill="#10b981"/>
    <circle cx="105" cy="255" r="18" fill="#06b6d4"/>
    <circle cx="105" cy="145" r="18" fill="#22d3ee"/>
    <circle cx="200" cy="200" r="19" fill="#34d399"/>
  </g>
</svg>
