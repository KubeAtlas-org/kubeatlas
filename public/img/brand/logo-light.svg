<svg xmlns="http://www.w3.org/2000/svg" viewBox="79 64 242 272" width="242" height="272" role="img" aria-label="KubeAtlas (light surface)">
  <title>KubeAtlas (light surface)</title>
  <desc>Hex network mark tuned for light backgrounds: darker edge blue, dark node halos for contrast on white.</desc>

  <g stroke="#2563eb" stroke-width="2" stroke-dasharray="6 4" fill="none" stroke-linecap="butt">
    <line x1="200" y1="200" x2="200" y2="90"/>
    <line x1="200" y1="200" x2="295" y2="145"/>
    <line x1="200" y1="200" x2="295" y2="255"/>
    <line x1="200" y1="200" x2="200" y2="310"/>
    <line x1="200" y1="200" x2="105" y2="255"/>
    <line x1="200" y1="200" x2="105" y2="145"/>
    <line x1="200" y1="90"  x2="295" y2="145"/>
    <line x1="295" y1="145" x2="295" y2="255"/>
    <line x1="295" y1="255" x2="200" y2="310"/>
    <line x1="200" y1="310" x2="105" y2="255"/>
    <line x1="105" y1="255" x2="105" y2="145"/>
    <line x1="105" y1="145" x2="200" y2="90"/>
  </g>

  <!-- nodes: dark halo at 50% + bright fill (rings read against a light surface) -->
  <g>
    <circle cx="200" cy="90"  r="26" fill="#1e0e55" fill-opacity="0.5"/><circle cx="200" cy="90"  r="18" fill="#8b5cf6"/>
    <circle cx="295" cy="145" r="26" fill="#2d1260" fill-opacity="0.5"/><circle cx="295" cy="145" r="18" fill="#a855f7"/>
    <circle cx="295" cy="255" r="26" fill="#2a0d5a" fill-opacity="0.5"/><circle cx="295" cy="255" r="18" fill="#7c3aed"/>
    <circle cx="200" cy="310" r="26" fill="#053a2a" fill-opacity="0.5"/><circle cx="200" cy="310" r="18" fill="#10b981"/>
    <circle cx="105" cy="255" r="26" fill="#023535" fill-opacity="0.5"/><circle cx="105" cy="255" r="18" fill="#06b6d4"/>
    <circle cx="105" cy="145" r="26" fill="#023535" fill-opacity="0.5"/><circle cx="105" cy="145" r="18" fill="#22d3ee"/>
    <circle cx="200" cy="200" r="28" fill="#054030" fill-opacity="0.5"/><circle cx="200" cy="200" r="19" fill="#34d399"/>
  </g>
</svg>
