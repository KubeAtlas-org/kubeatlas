  <text x="92" y="54" font-family="Inter, 'Helvetica Neue', Arial, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-1.1">
    <tspan fill="#07090f">kube</tspan><tspan fill="#2962FF">atlas</tspan>
