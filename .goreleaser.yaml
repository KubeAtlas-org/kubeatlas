# GoReleaser builds the cross-platform release artifacts. The binary is
# self-contained (frontend embedded via go:embed, see embed.go), so a single
# pure-Go build per target is all that's needed — no assets to ship alongside.
#
#   local snapshot : make release-snapshot
#   real release   : push a vX.Y.Z tag (see .github/workflows/release.yml)
version: 2

project_name: kubeatlas

before:
  hooks:
    - go mod tidy

builds:
  - id: kubeatlas
    main: ./server
    binary: kubeatlas
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X 'main.buildInfo={{ .ShortCommit }} {{ .CommitDate }}'

archives:
  - id: default
    # Version-less archive names so the download URL is stable across releases:
    #   .../releases/latest/download/kubeatlas_<os>_<arch>.tar.gz
    # (the README install one-liner relies on this).
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    # Windows users expect a zip.
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  # Format entries from the local git log (no per-commit author handle —
  # this is a solo repo, so `use: github` would just append the same name
  # to every line).
  use: git

release:
  github:
    owner: kubeatlas-org
    name: kubeatlas
