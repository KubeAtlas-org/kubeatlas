<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <style>
    @keyframes dash {
      to { stroke-dashoffset: -22; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.8); opacity: 0.75; }
      50% { transform: scale(1.25); opacity: 1; }
    }
    .moving-edges {
      stroke-dasharray: 14 8;
      animation: dash 1.5s linear infinite;
    }
    .pulsing-node {
      transform-origin: center;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .delay-1 { animation-delay: 0.5s; }
    .delay-2 { animation-delay: 1s; }
  </style>

  <g class="moving-edges" stroke="#2b6cb0" stroke-width="5" stroke-linecap="butt">
    <polygon points="250,75 385,150 385,310 250,385 115,310 115,150" fill="none" />
    <line x1="250" y1="75"  x2="250" y2="230" />
    <line x1="385" y1="150" x2="250" y2="230" />
    <line x1="385" y1="310" x2="250" y2="230" />
    <line x1="250" y1="385" x2="250" y2="230" />
    <line x1="115" y1="310" x2="250" y2="230" />
    <line x1="115" y1="150" x2="250" y2="230" />
  </g>

  <g>
    <circle class="pulsing-node" cx="250" cy="75" r="30" fill="#3b82f6" />
    
    <circle class="pulsing-node delay-1" cx="115" cy="150" r="30" fill="#00b4d8" />
    <circle class="pulsing-node delay-1" cx="115" cy="310" r="30" fill="#00b4d8" />
    
    <circle class="pulsing-node delay-2" cx="385" cy="150" r="30" fill="#7c4dff" />
    <circle class="pulsing-node delay-2" cx="385" cy="310" r="30" fill="#7c4dff" />
    
    <circle class="pulsing-node" cx="250" cy="230" r="30" fill="#2ec4b6" />
    <circle class="pulsing-node" cx="250" cy="385" r="30" fill="#2ec4b6" />
  </g>
</svg>
